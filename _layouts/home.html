<!DOCTYPE html>
<html lang="en-us">

  {% include head.html %}

  <body class="home-layout">

    {% include sidebar.html %}

    <label class="sidebar-toggle" for="sidebar-checkbox"></label>

    <div class="wrap">
      <div class="masthead">
        <div class="container">
          <h3 class="masthead-title">
            <a href="{{ '/' | absolute_url }}" title="Home">{{ site.title }}</a>
            <small>{{ site.tagline }}</small>
          </h3>
        </div>
      </div>

      <div class="container content">
        {{ content }}
      </div>
    </div>

    <script src="{{ '/public/js/script.js' | absolute_url }}"></script>
  </body>
</html>
